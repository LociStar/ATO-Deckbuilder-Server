name: build-and-push

on:
  push:
    branches: [master]
    # Don't rebuild when Flux only bumps the image tag in cluster/
    paths-ignore:
      - 'cluster/**'
      - 'clusters/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Skip commits made by Flux image-update automation
    if: github.actor != 'fluxcdbot'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          ts=$(date -u +%Y%m%d%H%M%S)
          echo "tag=${ts}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/locistar/ato-deckbuilder-server:${{ steps.meta.outputs.tag }}
            ghcr.io/locistar/ato-deckbuilder-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
